<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tom Clancy's - Rainbow Six: Mobile</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="header">
      <nav>
        <div class="nav-button" onclick="goToPage('home')">
          <input type="radio" name="navRadio" id="homeNav" checked />
          <label for="homeNav">Home</label>
        </div>
        <div class="nav-button" onclick="goToPage('about')">
          <input type="radio" name="navRadio" id="aboutNav" />
          <label for="aboutNav">About</label>
        </div>
        <div class="nav-button" onclick="goToPage('operators')">
          <input type="radio" name="navRadio" id="operatorsNav" />
          <label for="operatorsNav">Operators</label>
        </div>
        <div class="nav-button" onclick="goToPage('maps')">
          <input type="radio" name="navRadio" id="mapsNav" />
          <label for="mapsNav">Maps</label>
        </div>
        <div class="nav-button" onclick="goToPage('credits')">
          <input type="radio" name="navRadio" id="creditNav" />
          <label for="creditNav">Credits</label>
        </div>
      </nav>
    </section>

    <section id="home">
      <div id="titleLogo">
        <img src="src/img/asset/title-logo.jpg" alt="" />
      </div>
      <div id="playSect">
        <p>Available On</p>
        <button onclick="goToPage('about')">
          <div class="shine-effect"></div>
          Play Now! <span>></span>
        </button>
        <a
          href="https://play.google.com/store/apps/details?id=com.ubisoft.rainbowsixmobile.r6.fps.pvp.shooter&hl=id"
          target="_blank"
          ><img src="src/img/asset/get-it-on-google-play.svg"
        /></a>
        <a
          href="https://apps.apple.com/id/app/rainbow-six-mobile/id1608916511?l=id"
          target="_blank"
          ><img src="src/img/asset/get-it-on-app-store.svg" alt=""
        /></a>
      </div>
    </section>
    <section id="about" style="width: 100%; height: 100vh"></section>
    <script src="script.js"></script>
  </body>
</html>
